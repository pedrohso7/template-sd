version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/usuarios.db
    depends_on:
      - db-init

  db-init:
    image: busybox
    volumes:
      - db-data:/app/data
    command: ["sh", "-c", "touch /app/data/usuarios.db && chmod 666 /app/data/usuarios.db"]

  client:
    build: ./client
    environment:
      - DISPLAY=${DISPLAY}
      - SERVER_HOST=server
      - SERVER_PORT=5000
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      - server

volumes:
  db-data:
