version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/usuarios.db
    depends_on:
      - db-init

  db-init:
    image: busybox
    volumes:
      - ./data:/app/data
    command: ["sh", "-c", "touch /app/data/usuarios.db && chmod 666 /app/data/usuarios.db"]

  client:
    build: ./client
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - SERVER_HOST=server
      - SERVER_PORT=5000
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority
    depends_on:
      - server


