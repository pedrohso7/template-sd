version: '3.8'

services:
  server:
    init: true
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - ./data:/app/data
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." python main.py
    environment:
      - DB_PATH=/app/data/sistema.db
    depends_on:
      - db-init

  db-init:
    image: busybox
    volumes:
      - ./data:/app/data
    command: ["sh", "-c", "touch /app/data/sistema.db && chmod 666 /app/data/sistema.db"]

  client:
    init: true
    build: ./client
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=/tmp/wayland-runtime
      - QT_QPA_PLATFORM=wayland;xcb
      - XAUTHORITY=/tmp/.Xauthority
      - SERVER_HOST=server
      - SERVER_PORT=5000
    volumes:
      - ./client:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:/tmp/wayland-runtime
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." python main.py
    depends_on:
      - server


